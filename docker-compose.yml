# PostgreSQL для разработки мессенджера
# Запуск: docker-compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: mesanger-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mesanger
    ports:
      - "5432:5432"
    volumes:
      - mesanger_pgdata:/var/lib/postgresql/data

volumes:
  mesanger_pgdata:
